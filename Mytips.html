<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelBuddy – My Tips</title>
  <link rel="stylesheet" href="..//styles/style3.css">
  <script src="/scripts/main.js"></script>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered:', reg.scope))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>

  <div class="wrapper">

    <!-- HEADER -->
    <header class="navbar">
      <div class="logo">TravelBuddy</div>

      <nav>
        <a href="..//index.html" class="header-link">Home</a>
        <button class="btn-outline">Sign In</button>
        <button class="btn-solid">Register</button>
      </nav>
    </header>

    <!-- MY TIPS CONTENT -->
    <section class="hero">
      <div class="tips-container">
        <h2>My Travel Tips</h2>

        <p>Always plan your trip at least 2 weeks ahead.</p>
        <p>Research destinations before visiting.</p>
        <p>Set a realistic travel budget.</p>
        <p>Keep digital copies of important documents.</p>
        <p>Pack light and bring only essentials.</p>

      </div>
    </section>

  </div>

</body>

</html>
